<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Q&A — Interview Prep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #656d76;
            --accent: #388bfd;
            --danger: #f85149;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .header-inner {
            max-width: 600px; margin: 0 auto;
            display: flex; align-items: center;
            justify-content: space-between; height: 64px;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.05rem;
            color: var(--text-primary); text-decoration: none;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #bc8cff);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .main {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .delete-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .danger-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .delete-card h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--danger);
        }
        .delete-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .question-preview {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--danger);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.875rem;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .warning-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff; border: none;
            border-radius: var(--radius-sm);
            padding: 10px 28px;
            font-size: 0.9rem; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: opacity var(--transition), transform var(--transition);
        }
        .btn-danger:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 24px; font-size: 0.9rem; font-weight: 500;
            cursor: pointer; font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            transition: border-color var(--transition), color var(--transition);
        }
        .btn-ghost:hover { border-color: #484f58; color: var(--text-primary); }

        @media (max-width: 400px) {
            .delete-card { padding: 20px 16px; }
            .action-row { flex-direction: column-reverse; }
            .btn-ghost, .btn-danger { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a class="logo" href="{% url 'home' %}">
            <div class="logo-icon">🧠</div>
            Interview Prep
        </a>
    </div>
</header>

<main class="main">
    <div class="delete-card">
        <div class="danger-icon">🗑️</div>
        <h1>Delete Question?</h1>
        <p>You are about to permanently delete this Q&amp;A:</p>

        <div class="question-preview">
            {{ note.question }}
        </div>

        <p class="warning-text">⚠️ This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <div class="action-row">
                <a class="btn-ghost" href="{% url 'home' %}">← Cancel</a>
                <button type="submit" class="btn-danger">Yes, Delete</button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
